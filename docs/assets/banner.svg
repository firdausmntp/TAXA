<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="820" cy="60" r="120" fill="#818cf8" opacity="0.04"/>
  <circle cx="80" cy="220" r="100" fill="#38bdf8" opacity="0.04"/>
  <circle cx="450" cy="140" r="200" fill="#6366f1" opacity="0.03"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="70" x2="900" y2="70" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="140" x2="900" y2="140" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="210" x2="900" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="225" y1="0" x2="225" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="675" y1="0" x2="675" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Glow behind title -->
  <ellipse cx="450" cy="130" rx="200" ry="50" fill="#6366f1" opacity="0.12" filter="url(#glow)"/>

  <!-- Main title TAXA -->
  <text x="450" y="145" font-family="'Segoe UI', system-ui, sans-serif" font-size="96" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="-2" filter="url(#softglow)">TAXA</text>

  <!-- Tagline pill background -->
  <rect x="195" y="168" width="510" height="34" rx="17" fill="url(#pill)" stroke="url(#accent)" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Tagline text -->
  <text x="450" y="190" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Platform Edukasi Pajak Adaptif · Multi-Agent RAG · Pelajar Indonesia</text>

  <!-- Bottom accent line -->
  <rect x="340" y="220" width="220" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Samsung SFT badge -->
  <text x="450" y="248" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="1">SAMSUNG SOLVE FOR TOMORROW 2026</text>

  <!-- Decorative dots -->
  <circle cx="310" cy="248" r="2" fill="#38bdf8" opacity="0.5"/>
  <circle cx="590" cy="248" r="2" fill="#818cf8" opacity="0.5"/>
</svg>
