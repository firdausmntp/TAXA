<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="edu" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="psych" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="social" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" rx="12" fill="url(#bg2)"/>

  <!-- Subtle grid -->
  <line x1="286" y1="0" x2="286" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="573" y1="0" x2="573" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- CARD 1 — Pendidikan -->
  <rect x="24" y="24" width="238" height="152" rx="10" fill="#38bdf8" fill-opacity="0.06" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Icon circle -->
  <circle cx="72" cy="72" r="24" fill="#38bdf8" fill-opacity="0.15"/>
  <text x="72" y="80" font-size="22" text-anchor="middle">🎓</text>
  <!-- Label -->
  <text x="143" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#38bdf8" letter-spacing="1" font-weight="600">PENDIDIKAN</text>
  <text x="143" y="82" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#94a3b8">SDG 4 — Quality Education</text>
  <!-- Divider -->
  <line x1="48" y1="102" x2="238" y2="102" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Metric -->
  <text x="48" y="128" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="800" fill="#38bdf8">+25%</text>
  <text x="48" y="150" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#64748b">keterlibatan siswa</text>
  <text x="48" y="165" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#64748b">dalam 1 semester</text>

  <!-- CARD 2 — Psikologis -->
  <rect x="311" y="24" width="238" height="152" rx="10" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="359" cy="72" r="24" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="359" y="80" font-size="22" text-anchor="middle">🧠</text>
  <text x="430" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#a78bfa" letter-spacing="1" font-weight="600">PSIKOLOGIS</text>
  <text x="430" y="82" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#94a3b8">Self-Determination Theory</text>
  <line x1="335" y1="102" x2="525" y2="102" stroke="#a78bfa" stroke-opacity="0.15" stroke-width="1"/>
  <text x="335" y="128" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="800" fill="#a78bfa">SDT</text>
  <text x="335" y="150" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#64748b">mengurangi kejenuhan</text>
  <text x="335" y="165" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#64748b">akademik siswa</text>

  <!-- CARD 3 — Sosial -->
  <rect x="598" y="24" width="238" height="152" rx="10" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="646" cy="72" r="24" fill="#34d399" fill-opacity="0.15"/>
  <text x="646" y="80" font-size="22" text-anchor="middle">🤝</text>
  <text x="717" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#34d399" letter-spacing="1" font-weight="600">SOSIAL</text>
  <text x="717" y="82" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#94a3b8">Peer Collaborative Learning</text>
  <line x1="622" y1="102" x2="812" y2="102" stroke="#34d399" stroke-opacity="0.15" stroke-width="1"/>
  <text x="622" y="128" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="800" fill="#34d399">Clan</text>
  <text x="622" y="150" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#64748b">kolaborasi &amp; komunikasi</text>
  <text x="622" y="165" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#64748b">antar siswa diperkuat</text>
</svg>
